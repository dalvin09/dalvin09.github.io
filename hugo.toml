baseURL = "https://dalvin09.github.io/"
languageCode = "en-us"
title = "Dalvin | Trader Portfolio"
theme = "PaperMod"
paginate = 10

[params]
  author = "Dalvin"
  description = "Funded Forex & Options Trader | 5%ers | Documenting the process."
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  defaultTheme = "dark"

  [params.profileMode]
    enabled = true
    title = "Dalvin"
    subtitle = "Professional Trader | Futures & Forex | Auction Market Theory"
    displayFullLangName = true

    [[params.profileMode.buttons]]
      name = "The Playbook"
      url = "/playbook"

    [[params.profileMode.buttons]]
      name = "Live Dashboard"
      url = "/dashboard"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/dalvin09"

[menu]
  [[menu.main]]
    identifier = "forex"
    name = "Forex"
    url = "/forex/"
    weight = 10
  [[menu.main]]
    identifier = "options"
    name = "Options"
    url = "/options/"
    weight = 20
  [[menu.main]]
    identifier = "playbook"
    name = "Playbook"
    url = "/playbook/"
    weight = 30
  [[menu.main]]
    identifier = "dashboard"
    name = "Dashboard"
    url = "/dashboard/"
    weight = 40

[taxonomies]
  tag = "tags"
  category = "categories"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
