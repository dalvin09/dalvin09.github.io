**Funded Forex Trader** (The5ers) & **Options Trader** (Personal Account).
This site documents my trades, setups, and progress toward a desk-level career.
All trade recaps include entry rationale, charts, and verified P&L.
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/dalvin09"

