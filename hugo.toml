baseURL = "https://dalvin09.github.io/"
languageCode = "en-us"
title = "Dalvin | Trader Portfolio"
theme = "PaperMod"
paginate = 10

[params]
  author = "Dalvin"
  description = "Funded Forex & Options Trader | 5%ers | Documenting the process."
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  defaultTheme = "dark"

  [params.homeInfoParams]
    Title = "Dalvin — Trader Portfolio"
