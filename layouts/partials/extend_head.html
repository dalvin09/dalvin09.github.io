{{ if eq .Section "forex" }}
<style>
  body { background-color: #7a0000 !important; --theme: #7a0000 !important; }
</style>
{{ else if eq .Section "options" }}
<style>
  body { background-color: #050505 !important; --theme: #050505 !important; }
</style>
{{ else if eq .Section "playbook" }}
<style>
  body {
    background-color: #1a1a1a !important;
    --theme: #1a1a1a !important;
    background-image:
      linear-gradient(rgba(192, 192, 192, 0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(192, 192, 192, 0.07) 1px, transparent 1px),
      linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px) !important;
    background-size: 80px 80px, 80px 80px, 20px 20px, 20px 20px !important;
    background-position: -1px -1px, -1px -1px, -1px -1px, -1px -1px !important;
  }
</style>
{{ end }}
