{{ if eq .Section "forex" }}
<style>
  body { background-color: #7a0000 !important; --theme: #7a0000 !important; }
</style>
{{ else if eq .Section "options" }}
<style>
  body { background-color: #050505 !important; --theme: #050505 !important; }
</style>
{{ else if eq .Section "playbook" }}
<style>
  body {
    background: linear-gradient(135deg, #7a0000 50%, #2a2a2a 50%) !important;
    --theme: #1a1a1a !important;
  }
</style>
{{ else if eq .RelPermalink "/dashboard/" }}
<style>
  body {
    background:
      radial-gradient(ellipse at top right, rgba(204, 0, 0, 0.12) 0%, transparent 55%),
      radial-gradient(ellipse at bottom left, rgba(120, 120, 130, 0.12) 0%, transparent 55%),
      radial-gradient(ellipse at center, rgba(255, 255, 255, 1) 30%, rgba(240, 235, 235, 1) 100%) !important;
    --theme: #f5f5f5 !important;
  }
</style>
{{ end }}
